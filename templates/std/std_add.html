<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Add Student</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
{% include 'std/navbar.html'%}
<h1 class="text-center mt-3">Add new Students!</h1>
<div class="container">
    <div class="row">
        <div class="col-md-12">
            <div class="card">
                <div class="card-body">
                    <form action="">
                        <div class="md-3">
                            <label for="roll">Roll</label>
                            <input type="text" id="roll" name="roll" class="form-control" placeholder="Enter Your Roll Number" required>
                        </div>
                        <div class="md-3">
                            <label for="name">Name</label>
                            <input type="text" id="name" name="name" class="form-control" placeholder="Enter Your Name" required>
                        </div>
                        <div class="md-3">
                            <label for="email">Email</label>
                            <input type="text" id="email" name="email" class="form-control" placeholder="Enter Your Email" required>
                        </div>
                        <div class="md-3">
                            <label for="phone">Phone</label>
                            <input type="text" class="form-control" id="phone" name="phone" placeholder="Enter Your Phone Number" required>
                        </div>
                        <div class="md-3">
                            <label for="address">Address</label>
                            <textarea  id="address" name="address" rows ="5" class="form-control" placeholder="Enter Your Address" required></textarea>
                        </div>
                        <div class="container text-center my-2">
                            <button class="btn btn-primary">Add Student</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>
</html>
